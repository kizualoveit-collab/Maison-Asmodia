<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景グラデーション（黒） -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0012"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- ピンクグラデーション（メイン） -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5b8cc"/>
      <stop offset="50%" stop-color="#e87ea1"/>
      <stop offset="100%" stop-color="#c45a7c"/>
    </linearGradient>
    <!-- ゴールドグラデーション -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d090"/>
      <stop offset="100%" stop-color="#c8963c"/>
    </linearGradient>
    <!-- グローフィルター -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景円 -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- 外周リング（ゴールド細線） -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#pinkGrad)" stroke-width="0.6" opacity="0.3"/>

  <!-- 回転装飾ライン（放射状） -->
  <g opacity="0.18" stroke="url(#pinkGrad)" stroke-width="0.8">
    <line x1="256" y1="18" x2="256" y2="494"/>
    <line x1="18" y1="256" x2="494" y2="256"/>
    <line x1="74" y1="74" x2="438" y2="438"/>
    <line x1="438" y1="74" x2="74" y2="438"/>
    <line x1="37" y1="165" x2="475" y2="347"/>
    <line x1="475" y1="165" x2="37" y2="347"/>
    <line x1="165" y1="37" x2="347" y2="475"/>
    <line x1="347" y1="37" x2="165" y2="475"/>
  </g>

  <!-- 内周魔法陣リング -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#pinkGrad)" stroke-width="0.8" opacity="0.25" stroke-dasharray="6 8"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#pinkGrad)" stroke-width="0.6" opacity="0.18"/>

  <!-- ペンタグラム（五芒星）— 中サイズ、背面 -->
  <g filter="url(#softGlow)" opacity="0.35">
    <polygon
      points="256,96 289,188 388,188 311,244 340,338 256,282 172,338 201,244 124,188 223,188"
      fill="none"
      stroke="url(#pinkGrad)"
      stroke-width="1.8"
      stroke-linejoin="round"
    />
  </g>

  <!-- 悪魔の角（左） -->
  <g filter="url(#glow)">
    <path
      d="M 180 260
         C 160 230, 130 190, 148 145
         C 158 118, 175 108, 185 120
         C 175 140, 168 165, 178 195
         C 185 215, 196 235, 200 258"
      fill="url(#pinkGrad)"
      stroke="none"
      opacity="0.92"
    />
    <!-- 角のハイライト -->
    <path
      d="M 168 195
         C 162 172, 164 148, 172 133"
      fill="none"
      stroke="#f5d0e0"
      stroke-width="2"
      stroke-linecap="round"
      opacity="0.5"
    />
  </g>

  <!-- 悪魔の角（右） -->
  <g filter="url(#glow)">
    <path
      d="M 332 260
         C 352 230, 382 190, 364 145
         C 354 118, 337 108, 327 120
         C 337 140, 344 165, 334 195
         C 327 215, 316 235, 312 258"
      fill="url(#pinkGrad)"
      stroke="none"
      opacity="0.92"
    />
    <path
      d="M 344 195
         C 350 172, 348 148, 340 133"
      fill="none"
      stroke="#f5d0e0"
      stroke-width="2"
      stroke-linecap="round"
      opacity="0.5"
    />
  </g>

  <!-- 中央ダイヤ（菱形）装飾 -->
  <g filter="url(#glow)">
    <!-- 大菱形（外） -->
    <polygon
      points="256,188 304,240 256,292 208,240"
      fill="none"
      stroke="url(#goldGrad)"
      stroke-width="1.8"
      opacity="0.8"
    />
    <!-- 小菱形（内） -->
    <polygon
      points="256,210 278,240 256,270 234,240"
      fill="url(#goldGrad)"
      opacity="0.6"
    />
    <!-- 中心点 -->
    <circle cx="256" cy="240" r="5" fill="url(#pinkGrad)" opacity="0.9"/>
  </g>

  <!-- ダイヤ上下の装飾ライン -->
  <g stroke="url(#goldGrad)" stroke-width="1" opacity="0.5">
    <line x1="256" y1="180" x2="256" y2="162"/>
    <line x1="248" y1="171" x2="264" y2="171"/>
    <line x1="256" y1="300" x2="256" y2="318"/>
    <line x1="248" y1="309" x2="264" y2="309"/>
  </g>

  <!-- 左右の小ダイヤ装飾 -->
  <g fill="none" stroke="url(#pinkGrad)" stroke-width="1.2" opacity="0.55">
    <polygon points="180,240 194,252 180,264 166,252"/>
    <polygon points="332,240 346,252 332,264 318,252"/>
  </g>

  <!-- 翼（左）— シンプルなアーチ -->
  <g opacity="0.45" filter="url(#softGlow)">
    <path
      d="M 208 260
         C 188 248, 148 238, 112 248
         C 96 252, 84 260, 90 272
         C 100 258, 120 250, 145 255
         C 168 260, 188 268, 205 272"
      fill="url(#pinkGrad)"
      stroke="none"
    />
    <path
      d="M 200 265
         C 175 255, 136 250, 108 264
         C 100 268, 92 278, 98 288
         C 112 275, 138 268, 162 272
         C 182 275, 198 280, 208 282"
      fill="url(#pinkGrad)"
      stroke="none"
      opacity="0.6"
    />
  </g>

  <!-- 翼（右） -->
  <g opacity="0.45" filter="url(#softGlow)">
    <path
      d="M 304 260
         C 324 248, 364 238, 400 248
         C 416 252, 428 260, 422 272
         C 412 258, 392 250, 367 255
         C 344 260, 324 268, 307 272"
      fill="url(#pinkGrad)"
      stroke="none"
    />
    <path
      d="M 312 265
         C 337 255, 376 250, 404 264
         C 412 268, 420 278, 414 288
         C 400 275, 374 268, 350 272
         C 330 275, 314 280, 304 282"
      fill="url(#pinkGrad)"
      stroke="none"
      opacity="0.6"
    />
  </g>

  <!-- コーナー飾り（四隅のダイヤ小点） -->
  <g fill="url(#goldGrad)" opacity="0.4">
    <polygon points="256,26 260,36 256,46 252,36"/>
    <polygon points="256,466 260,476 256,486 252,476"/>
    <polygon points="26,256 36,260 46,256 36,252"/>
    <polygon points="466,256 476,260 486,256 476,252"/>
  </g>

  <!-- 最外周グロー効果（ピンクの光輪） -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="url(#pinkGrad)" stroke-width="3" opacity="0.1" filter="url(#glow)"/>
</svg>
